<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <!-- Background Circle (Main Plate) -->
    <circle cx="200" cy="200" r="180" fill="#1c1c22" stroke="#333340" stroke-width="4" />
    <circle cx="200" cy="200" r="170" fill="none" stroke="#c9983a" stroke-width="2" stroke-dasharray="10 10" opacity="0.3" />
    
    <!-- Outer Rim -->
    <circle cx="200" cy="200" r="185" fill="none" stroke="#333340" stroke-width="10" />
    
    <!-- Hub -->
    <circle cx="200" cy="200" r="50" fill="#111114" stroke="#c9983a" stroke-width="8" />
    <circle cx="200" cy="200" r="25" fill="#c9983a" /> <!-- Bar End -->
    
    <!-- Text Paths -->
    <defs>
        <path id="topCurve" d="M 60,218 A 140,140 0 0 1 340,218" />
        <path id="bottomCurve" d="M 60,218 A 140,140 0 0 0 340,218" />
    </defs>
    
    <!-- Curved Text -->
    <text fill="#e2e0db" font-family="'JetBrains Mono', monospace, Courier New, monospace" font-size="48" font-weight="bold" letter-spacing="8">
        <textPath href="#topCurve" xlink:href="#topCurve" startOffset="50%" text-anchor="middle">IRON</textPath>
    </text>
    <text fill="#c9983a" font-family="'JetBrains Mono', monospace, Courier New, monospace" font-size="48" font-weight="bold" letter-spacing="8">
        <textPath href="#bottomCurve" xlink:href="#bottomCurve" startOffset="50%" text-anchor="middle">LOG</textPath>
    </text>
    
    <!-- Decorative Weights -->
    <text x="200" y="110" text-anchor="middle" fill="#7a7870" font-family="monospace" font-size="14" font-weight="bold">45 LB</text>
    <text x="200" y="305" text-anchor="middle" fill="#7a7870" font-family="monospace" font-size="14" font-weight="bold">20.4 KG</text>
</svg>
